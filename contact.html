<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally - Contact</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Base Scripts -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/nav.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/main.js"></script>
</head>
<body class="antialiased bg-slate-950 text-slate-50 selection:bg-electric-green selection:text-slate-900">
    <div id="navbar-placeholder"></div>
    
    <main class="pt-32 pb-24">
        <section class="container mx-auto px-4 max-w-6xl">
            <div class="bg-slate-900 border border-white/10 rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl" data-aos>
                
                <!-- Contact Form -->
                <div class="flex-1 p-10 md:p-16">
                    <h1 class="text-4xl font-bold mb-8" data-i18n="contact.title">Get in Touch</h1>
                    
                    <form class="space-y-6">
                        <div>
                            <input type="text" data-i18n="contact.name" placeholder="Full Name" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 focus:outline-none focus:border-electric-green transition-colors text-white placeholder:text-gray-500">
                        </div>
                        <div>
                            <input type="email" data-i18n="contact.email" placeholder="Email Address" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 focus:outline-none focus:border-electric-green transition-colors text-white placeholder:text-gray-500">
                        </div>
                        <div>
                            <textarea data-i18n="contact.message" placeholder="Your Message" rows="5" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 focus:outline-none focus:border-electric-green transition-colors text-white placeholder:text-gray-500 resize-none"></textarea>
                        </div>
                        <button type="button" class="w-full py-4 bg-electric-green text-slate-950 font-bold rounded-xl hover-glow transition-all text-lg" data-i18n="contact.submit">
                            Send Message
                        </button>
                    </form>
                </div>

                <!-- Contact Info & Map Placeholder -->
                <div class="flex-1 bg-slate-800 relative min-h-[400px]">
                    <div class="absolute inset-0 p-8 flex flex-col justify-between z-10 pointer-events-none">
                        <div class="bg-slate-900/80 backdrop-blur-md p-6 rounded-2xl border border-white/10 inline-block">
                            <div class="flex items-center gap-3 mb-2">
                                <i data-lucide="map-pin" class="text-electric-green"></i>
                                <span class="font-bold text-lg">Rally HQ</span>
                            </div>
                            <p class="text-gray-400" data-i18n="contact.address">1 Padel St, Tel Aviv, Israel</p>
                        </div>
                    </div>
                    <!-- Map Placeholder Image -->
                    <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=800&q=80" alt="Map" class="w-full h-full object-cover opacity-50 mix-blend-overlay">
                    
                    <!-- We would use an iframe with google maps here, but we substitute with an image map for prototype purposes -->
                    <div class="absolute inset-0 flex items-center justify-center opacity-30">
                        <i data-lucide="map" class="w-32 h-32"></i>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
