<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally - Pricing</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Base Scripts -->
    <script src="/assets/js/i18n.js"></script>
    <script src="/assets/js/nav.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/main.js"></script>
</head>
<body class="antialiased bg-slate-950 text-slate-50 selection:bg-electric-green selection:text-slate-900">
    <div id="navbar-placeholder"></div>
    
    <main class="pt-32 pb-24">
        <section class="container mx-auto px-4 mb-20 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-6" data-aos data-i18n="pricing.title">Transparent Pricing</h1>
        </section>

        <!-- Pricing Cards -->
        <section class="container mx-auto px-4 max-w-5xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <!-- App Tier -->
                <div class="bg-slate-900 border border-white/10 rounded-3xl p-10 flex flex-col" data-aos>
                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-gray-300 mb-2" data-i18n="pricing.app_title">For Padel Lovers</h3>
                        <div class="text-5xl font-black text-white" data-i18n="pricing.app_price">Free</div>
                    </div>
                    <ul class="space-y-4 mb-10 flex-1">
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.app_feature1">Court Search</span>
                        </li>
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.app_feature2">Personal Ranking</span>
                        </li>
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.app_feature3">Tournament Entry</span>
                        </li>
                    </ul>
                    <a href="/app.html" class="block text-center w-full py-4 border border-white/20 rounded-xl hover:bg-white/5 transition-colors font-bold" data-i18n="hero.cta_app">Download App</a>
                </div>

                <!-- CRM Tier -->
                <div class="bg-slate-800 border-2 border-electric-green rounded-3xl p-10 flex flex-col relative shadow-[0_0_50px_rgba(57,255,20,0.1)]" data-aos>
                    <div class="absolute top-0 right-1/2 translate-x-1/2 -translate-y-1/2 bg-electric-green text-slate-950 font-bold px-4 py-1 rounded-full text-sm">PRO</div>
                    <div class="mb-8 mt-4">
                        <h3 class="text-2xl font-bold text-gray-300 mb-2" data-i18n="pricing.crm_title">For Clubs</h3>
                        <div class="text-5xl font-black text-white" data-i18n="pricing.crm_price">Contact Us</div>
                    </div>
                    <ul class="space-y-4 mb-10 flex-1">
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.crm_feature1">Full Court Management</span>
                        </li>
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.crm_feature2">Automated Payments</span>
                        </li>
                        <li class="flex items-center gap-3">
                            <i data-lucide="check" class="text-electric-green"></i>
                            <span data-i18n="pricing.crm_feature3">Advanced Reports</span>
                        </li>
                    </ul>
                    <a href="/contact.html" class="block text-center w-full py-4 bg-electric-green text-slate-950 rounded-xl hover-glow font-bold" data-i18n="nav.contact">Contact</a>
                </div>
                
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
